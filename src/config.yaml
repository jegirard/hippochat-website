site:
  name: HippoChat
  site: 'https://hippochathealth.com'
  base: '/'
  trailingSlash: false

# Default SEO metadata
metadata:
  title:
    default: HippoChat
    template: '%s — HippoChat'
  description: 'HIPAA-compliant messaging for clinical teams across organizations. Communicate with external nurses, answering services, and partner clinicians securely.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: HippoChat
    images:
      - url: '~/assets/images/og-image.png'
        width: 1200
        height: 628
    type: website

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false

analytics:
  vendors:
    googleAnalytics:
      id: G-3WXELBEY99
      partytown: false

# TODO: Add Google Search Console verification
# 1. Go to https://search.google.com/search-console
# 2. Add property for hippochathealth.com
# 3. Choose "HTML tag" verification method
# 4. Set googleSiteVerificationId below to the content value from the meta tag
# googleSiteVerificationId: 'your-verification-id'

ui:
  theme: 'light:only'
